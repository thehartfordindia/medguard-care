databases:
  - name: medguard-db
    plan: free
    databaseName: medguard
    user: medguard

services:
  - type: web
    name: medguard-care
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: ADMIN_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: medguard-db
          property: connectionString
      # - key: WEBSITE_URL     # e.g. https://medguard-care.onrender.com
