<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>MedGuard Care — Ops Console</title>
    <style>
      body { font-family: system-ui, Segoe UI, sans-serif; margin: 0; background: #0a1418; color: #e7f2f4; }
      header { padding: 1rem 1.4rem; background: #10222a; border-bottom: 1px solid #24424c; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
      h1 { font-size: 1.2rem; margin: 0; }
      input, button { font-family: inherit; font-size: 0.9rem; border-radius: 10px; border: 1px solid #24424c; padding: 0.5rem 0.8rem; }
      input { background: #142c35; color: #e7f2f4; }
      button { background: #0e7490; color: #fff; cursor: pointer; border: none; font-weight: 700; }
      main { padding: 1.4rem; }
      .card { background: #10222a; border: 1px solid #24424c; border-radius: 14px; padding: 1rem; margin-bottom: 0.9rem; }
      .row { display: flex; justify-content: space-between; gap: 1rem; flex-wrap: wrap; }
      .muted { color: #9db4ba; font-size: 0.85rem; }
      .pill { display: inline-block; padding: 0.1rem 0.6rem; border-radius: 999px; background: #14b8a6; color: #04231f; font-weight: 700; font-size: 0.75rem; }
      .pill.tkt { background: #f59e0b; color: #221600; }
      .pill.cb { background: #e11d48; color: #fff; }
      select { background: #142c35; color: #e7f2f4; border: 1px solid #24424c; border-radius: 8px; padding: 0.35rem; }
      .tabs { display: flex; gap: 0.5rem; }
      .tab { background: #142c35; color: #9db4ba; }
      .tab.active { background: #0e7490; color: #fff; }
    </style>
  </head>
  <body>
    <header>
      <h1>🩺 MedGuard Care — Ops Console</h1>
      <input id="secret" type="password" placeholder="Admin secret" />
      <div class="tabs">
        <button id="tabOrders" class="tab active">Orders</button>
        <button id="tabTickets" class="tab">Support tickets</button>
      </div>
      <button id="loadBtn">Load</button>
      <span id="status" class="muted"></span>
    </header>
    <main id="list"></main>
    <script>
      const API = location.origin;
      const STATUSES = ["PLACED", "CONFIRMED", "PACKED", "OUT_FOR_DELIVERY", "DELIVERED", "PROVIDER_ASSIGNED", "SAMPLE_COLLECTED", "REPORT_READY", "COMPLETED", "CANCELLED"];
      const TICKET_STATUSES = ["OPEN", "IN_PROGRESS", "RESOLVED", "CLOSED"];
      let view = "orders";
      function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
      function inr(n) { return "₹" + Math.round(n || 0).toLocaleString("en-IN"); }
      async function load() {
        return view === "orders" ? loadOrders() : loadTickets();
      }
      async function loadOrders() {
        const secret = document.getElementById("secret").value;
        document.getElementById("status").textContent = "Loading…";
        try {
          const res = await fetch(API + "/api/admin/orders", { headers: { "x-admin-secret": secret } });
          if (!res.ok) throw new Error("Unauthorized or error");
          const data = await res.json();
          render(data.orders || [], secret);
          document.getElementById("status").textContent = data.orders.length + " orders";
        } catch (e) {
          document.getElementById("status").textContent = "⚠️ " + e.message;
        }
      }
      async function loadTickets() {
        const secret = document.getElementById("secret").value;
        document.getElementById("status").textContent = "Loading…";
        try {
          const res = await fetch(API + "/api/admin/tickets", { headers: { "x-admin-secret": secret } });
          if (!res.ok) throw new Error("Unauthorized or error");
          const data = await res.json();
          renderTickets(data.tickets || []);
          document.getElementById("status").textContent = data.tickets.length + " tickets";
        } catch (e) {
          document.getElementById("status").textContent = "⚠️ " + e.message;
        }
      }
      function render(orders, secret) {
        document.getElementById("list").innerHTML = orders.map(function (o) {
          const opts = STATUSES.map(function (s) { return '<option ' + (s === o.status ? "selected" : "") + '>' + s + '</option>'; }).join("");
          const detail = o.type === "medicine"
            ? (o.items || []).map(function (i) { return i.name + " ×" + i.qty; }).join(", ")
            : o.type === "lab"
            ? (o.tests || []).map(function (t) { return t.name; }).join(", ") + " · " + (o.slot || "")
            : (o.provider ? o.provider.name + " · " + o.visitMode + " · " + (o.slot || "") : "");
          return '<div class="card"><div class="row"><div><b>' + o.id + '</b> <span class="pill">' + o.type + '</span>' +
            (o.coupon ? ' <span class="pill tkt">' + esc(o.coupon) + '</span>' : '') + '<br>' +
            '<span class="muted">' + (o.customer ? esc(o.customer.name) + " · " + esc(o.customer.phone) : "") + '</span></div>' +
            '<div style="text-align:right"><b>' + inr(o.total) + '</b><br><span class="muted">' + new Date(o.createdAt).toLocaleString() + '</span></div></div>' +
            '<p class="muted">' + esc(detail) + '</p>' +
            '<div class="row"><select data-id="' + o.id + '">' + opts + '</select>' +
            '<button data-save="' + o.id + '">Update status</button></div></div>';
        }).join("") || '<p class="muted">No orders yet.</p>';
        document.querySelectorAll("[data-save]").forEach(function (btn) {
          btn.addEventListener("click", async function () {
            const id = btn.getAttribute("data-save");
            const sel = document.querySelector('select[data-id="' + id + '"]');
            await fetch(API + "/api/admin/status", {
              method: "POST",
              headers: { "Content-Type": "application/json", "x-admin-secret": secret },
              body: JSON.stringify({ orderId: id, status: sel.value }),
            });
            load();
          });
        });
      }
      function renderTickets(tickets) {
        document.getElementById("list").innerHTML = tickets.map(function (t) {
          return '<div class="card"><div class="row"><div><b>' + t.id + '</b> <span class="pill tkt">' + esc(t.category) + '</span>' +
            (t.callbackRequested ? ' <span class="pill cb">📞 callback</span>' : '') + '<br>' +
            '<span class="muted">' + esc(t.name) + " · " + esc(t.contact) + (t.orderRef ? " · ref " + esc(t.orderRef) : "") + '</span></div>' +
            '<div style="text-align:right"><span class="pill">' + esc(t.status) + '</span><br><span class="muted">' + new Date(t.createdAt).toLocaleString() + '</span></div></div>' +
            '<p class="muted">' + esc(t.message) + '</p></div>';
        }).join("") || '<p class="muted">No tickets yet.</p>';
      }
      function setView(v) {
        view = v;
        document.getElementById("tabOrders").classList.toggle("active", v === "orders");
        document.getElementById("tabTickets").classList.toggle("active", v === "tickets");
        load();
      }
      document.getElementById("loadBtn").addEventListener("click", load);
      document.getElementById("tabOrders").addEventListener("click", function () { setView("orders"); });
      document.getElementById("tabTickets").addEventListener("click", function () { setView("tickets"); });
    </script>
  </body>
</html>
